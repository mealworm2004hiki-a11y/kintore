<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#14171a">
<title>筋トレ記録</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600&family=Noto+Sans+JP:wght@400;500;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#14171a; --surface:#1c2024; --surface2:#23272b; --line:#2a2f34;
    --text:#e8e6e3; --muted:#9aa0a5; --dim:#7c8085;
    --rust:#c1632b; --rust-l:#e8a15f; --patina:#4f8072; --amber:#c98a3f;
    --font-head:'Oswald',sans-serif; --font-body:'Noto Sans JP',sans-serif; --font-mono:'JetBrains Mono',monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--bg);color:var(--text);font-family:var(--font-body);-webkit-font-smoothing:antialiased}
  body{padding-bottom:76px;min-height:100vh}
  .num{font-family:var(--font-mono);font-variant-numeric:tabular-nums}
  h1,h2,h3{font-family:var(--font-head);font-weight:600;letter-spacing:.02em}
  button{font-family:var(--font-body);cursor:pointer}
  .app{max-width:640px;margin:0 auto}

  header{position:sticky;top:0;z-index:20;background:rgba(20,23,26,.94);backdrop-filter:blur(8px);border-bottom:.5px solid var(--line);padding:14px 16px calc(14px + env(safe-area-inset-top)) 16px;padding-top:max(14px,env(safe-area-inset-top))}
  .brand{display:flex;align-items:center;justify-content:space-between}
  .brand h1{font-size:19px;color:var(--text)}
  .brand h1 .accent{color:var(--rust)}
  .icon-btn{background:transparent;border:.5px solid var(--line);color:var(--muted);border-radius:8px;padding:7px 9px;font-size:13px;display:inline-flex;align-items:center;gap:5px}
  .icon-btn:active{transform:scale(.97)}

  .weekbar{display:flex;align-items:center;justify-content:space-between;margin-top:12px}
  .weekbar .wk{font-family:var(--font-mono);font-size:12px;color:var(--dim);letter-spacing:.03em}
  .weekbar .phase{font-size:11px;color:var(--patina)}
  .weekbar button{background:transparent;border:.5px solid var(--line);color:var(--text);border-radius:8px;width:34px;height:30px;font-size:15px}
  .weekbar button:disabled{opacity:.3}

  main{padding:16px}
  .section-label{font-size:12px;color:var(--dim);letter-spacing:.04em;margin:4px 2px 10px;text-transform:uppercase}

  .empty{background:var(--surface);border:.5px solid var(--line);border-radius:14px;padding:32px 20px;text-align:center}
  .empty .big{font-size:15px;margin-bottom:6px}
  .empty p{color:var(--muted);font-size:13px;line-height:1.7;margin-bottom:16px}
  .btn-primary{background:var(--rust);color:#fff;border:none;border-radius:10px;padding:11px 18px;font-size:14px;font-weight:500}
  .btn-primary:active{transform:scale(.98)}
  .btn-ghost{background:transparent;border:.5px solid var(--line);color:var(--text);border-radius:10px;padding:11px 16px;font-size:14px}

  .group-head{display:flex;align-items:baseline;gap:8px;margin:22px 2px 12px}
  .group-head:first-of-type{margin-top:6px}
  .group-head h3{font-size:15px;color:var(--text)}
  .group-head .sub{font-size:11px;color:var(--dim);font-family:var(--font-mono)}

  .bar-row{margin-bottom:15px}
  .bar-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px}
  .bar-top .mn{font-size:13px;color:#c9cdd1}
  .bar-top .vals{font-family:var(--font-mono);font-size:11px}
  .track{position:relative;height:9px;background:var(--surface2);border-radius:5px;overflow:hidden}
  .fill{position:absolute;left:0;top:0;height:100%;border-radius:5px 0 0 5px;transition:width .3s}
  .tick{position:absolute;top:-2px;height:13px;width:1px;background:rgba(232,230,227,.35)}
  .tick.mrv{background:rgba(232,230,227,.6)}
  .status-pill{font-size:10px;padding:1px 6px;border-radius:4px;margin-left:6px;font-family:var(--font-body)}

  .summary-card{background:var(--surface);border:.5px solid var(--line);border-radius:14px;padding:14px 16px;margin-bottom:20px}
  .summary-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
  .stat .k{font-size:11px;color:var(--dim);margin-bottom:3px}
  .stat .v{font-family:var(--font-mono);font-size:18px;color:var(--text)}
  .stat .v small{font-size:11px;color:var(--muted)}

  .overlay{position:fixed;inset:0;z-index:50;background:rgba(10,12,14,.6);display:none;align-items:flex-end;justify-content:center}
  .overlay.open{display:flex}
  .sheet{background:var(--bg);width:100%;max-width:640px;max-height:92vh;overflow-y:auto;border-radius:18px 18px 0 0;border-top:.5px solid var(--line);padding:18px 16px calc(28px + env(safe-area-inset-bottom))}
  .sheet-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
  .sheet-head h2{font-size:17px}
  .sheet-head button{background:transparent;border:none;color:var(--muted);font-size:22px;line-height:1}
  .set-item{display:flex;align-items:center;justify-content:space-between;padding:13px 0;border-bottom:.5px solid var(--line)}
  .set-item .lbl{font-size:14px}
  .set-item .desc{font-size:12px;color:var(--muted);margin-top:2px}
  .set-item .ctl{display:flex;gap:8px;align-items:center}
  .file-drop{border:1px dashed var(--line);border-radius:12px;padding:22px;text-align:center;color:var(--muted);font-size:13px;margin-bottom:14px}
  .msg{border-radius:10px;padding:11px 13px;font-size:13px;margin-top:12px;line-height:1.6;display:none}
  .msg.ok{background:rgba(79,128,114,.16);color:#8fd0bf;display:block}
  .msg.err{background:rgba(193,99,43,.16);color:var(--rust-l);display:block}
  .msg.info{background:var(--surface);color:var(--muted);display:block}

  table.mini{width:100%;border-collapse:collapse;font-size:13px}
  table.mini td{padding:9px 4px;border-bottom:.5px solid var(--line);vertical-align:top}
  .tag-chip{display:inline-block;font-size:11px;background:var(--surface2);color:#c9cdd1;border-radius:5px;padding:2px 7px;margin:2px 3px 0 0}
  .tag-chip.sec{opacity:.62}
  .flag{color:var(--amber);font-size:11px}
  .inactive-badge{font-size:10px;color:var(--dim);border:.5px solid var(--line);border-radius:4px;padding:1px 5px;margin-left:6px}
  input[type=number],input[type=text],select{background:var(--surface2);border:.5px solid var(--line);color:var(--text);border-radius:8px;padding:8px 9px;font-family:var(--font-mono);font-size:13px;width:100%}
  label.fld{display:block;font-size:12px;color:var(--muted);margin:10px 0 4px}
  .row2{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px}
  .search{width:100%;margin-bottom:12px}
  .toggle{background:var(--surface2);border:.5px solid var(--line);border-radius:6px;color:var(--muted);font-size:11px;padding:4px 9px}
  .toggle.on{background:rgba(79,128,114,.2);color:#8fd0bf;border-color:transparent}

  nav.tabs{position:fixed;bottom:0;left:0;right:0;z-index:30;background:rgba(20,23,26,.96);backdrop-filter:blur(8px);border-top:.5px solid var(--line);display:flex;justify-content:space-around;padding:8px 0 calc(6px + env(safe-area-inset-bottom))}
  nav.tabs a{display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--dim);font-size:10px;text-decoration:none;background:none;border:none;padding:2px 14px}
  nav.tabs a.active{color:var(--rust)}
  nav.tabs a svg{width:21px;height:21px;stroke:currentColor;fill:none;stroke-width:1.7}
  .soon{color:var(--dim);font-size:13px;text-align:center;padding:60px 20px;line-height:1.8}
  a.link{color:var(--rust-l);text-decoration:none;border-bottom:.5px solid rgba(232,161,95,.4)}

  .tpl-card{background:var(--surface);border:.5px solid var(--line);border-radius:14px;padding:14px 16px;margin-bottom:14px}
  .tpl-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;gap:8px}
  .tpl-head h3{font-size:15px;color:var(--text)}
  .tpl-head .acts{display:flex;gap:6px;flex-shrink:0}
  .tpl-item{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-top:.5px solid var(--line);font-size:13px;gap:8px}
  .tpl-item .nm{color:#c9cdd1}
  .btn-sm{background:var(--surface2);border:.5px solid var(--line);color:var(--text);border-radius:8px;padding:6px 11px;font-size:12px}
  .btn-sm.accent{background:rgba(193,99,43,.16);color:var(--rust-l);border-color:transparent}

  .startgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:6px}
  .start-tile{background:var(--surface);border:.5px solid var(--line);border-radius:14px;padding:16px 14px;text-align:left;color:var(--text)}
  .start-tile:active{transform:scale(.98)}
  .start-tile .t{font-size:15px;font-weight:500;margin-bottom:4px}
  .start-tile .s{font-size:11px;color:var(--dim);font-family:var(--font-mono)}
  .datepick{display:flex;align-items:center;gap:10px;margin-bottom:16px}
  .datepick input{width:auto;flex:1}

  .ex-card{background:var(--surface);border:.5px solid var(--line);border-radius:14px;padding:13px 14px;margin-bottom:12px}
  .ex-card .exh{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
  .ex-card .exh .nm{font-size:15px;color:var(--text)}
  .ex-card .hint{font-size:11px;color:var(--dim);font-family:var(--font-mono);margin:3px 0 9px}
  .colhead{display:grid;grid-template-columns:20px 1fr 1fr .8fr 1.3fr 22px;gap:6px;font-size:10px;color:var(--dim);margin-bottom:5px;padding:0 2px}
  .colhead span{text-align:center}.colhead span:first-child{text-align:left}
  .setrow{display:grid;grid-template-columns:20px 1fr 1fr .8fr 1.3fr 22px;gap:6px;align-items:center;margin-bottom:6px}
  .setrow .sn{font-family:var(--font-mono);font-size:12px;color:var(--dim);text-align:center}
  .setrow input,.setrow select{padding:8px 4px;font-size:13px;text-align:center}
  .setrow .rm{background:transparent;border:none;color:var(--dim);font-size:17px;padding:0}
  .ex-memo{margin-top:8px}
  .ex-memo input{font-family:var(--font-body);font-size:12px;padding:7px 9px}
  .ex-rm{background:transparent;border:none;color:var(--dim);font-size:12px;padding:2px}
  .addbtn{background:transparent;border:.5px dashed var(--line);color:var(--muted);border-radius:9px;padding:9px;width:100%;font-size:13px;margin-top:4px}
  .savebar{display:flex;gap:8px;margin:18px 0 8px}
  .savebar button{flex:1;padding:13px;border-radius:11px;font-size:14px;font-weight:500;border:none}
  .savebar .save{background:var(--rust);color:#fff}
  .savebar .discard{background:transparent;border:.5px solid var(--line);color:var(--muted)}
  .picker-list{max-height:280px;overflow-y:auto;margin-top:8px}
  .pick-item{padding:11px 6px;border-bottom:.5px solid var(--line);font-size:14px;display:flex;justify-content:space-between;align-items:center}
  .pick-item .pt{font-size:11px;color:var(--dim)}

  .coach-card{background:var(--surface);border:.5px solid var(--line);border-left:3px solid var(--rust);border-radius:0 12px 12px 0;padding:12px 14px;margin-bottom:12px}
  .coach-card.win{border-left-color:var(--patina)}
  .coach-card .ch{display:flex;align-items:center;gap:7px;margin-bottom:5px;font-size:12px}
  .coach-card .ch b{font-weight:500;color:var(--rust-l)}
  .coach-card.win .ch b{color:#8fd0bf}
  .coach-card .ch i{font-style:normal;width:17px;height:17px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:11px;background:rgba(193,99,43,.2);color:var(--rust-l);flex-shrink:0}
  .coach-card.win .ch i{background:rgba(79,128,114,.2);color:#8fd0bf}
  .coach-card .ch .cnt{margin-left:auto;font-family:var(--font-mono);font-size:11px;color:var(--dim)}
  .coach-card .cx{font-size:14px;color:var(--text);margin-bottom:7px}
  .coach-card .cnext{font-size:12px;color:var(--muted);margin-bottom:9px;line-height:1.6}
  .coach-card .cnext b{color:var(--rust-l);font-weight:500}
  .coach-card .cbtns{display:flex;gap:8px}

  .cond-card{background:var(--surface);border:.5px solid var(--line);border-radius:14px;padding:14px 16px}
  .cond-top{display:flex;justify-content:space-between;align-items:center;color:var(--text);font-size:13px}
  .cond-list{margin-top:12px;border-top:.5px solid var(--line)}
  .cond-item{display:flex;justify-content:space-between;align-items:center;gap:8px;padding:9px 0;border-bottom:.5px solid var(--line);font-size:13px}
  .cond-item .del{background:transparent;border:none;color:var(--dim);font-size:15px;padding:0 2px}
  .chips{display:flex;flex-wrap:wrap;gap:7px;margin:6px 0 4px}
  .chip{background:var(--surface2);border:.5px solid var(--line);color:#c9cdd1;border-radius:16px;padding:6px 13px;font-size:13px}
  .chip.on{background:rgba(193,99,43,.18);color:var(--rust-l);border-color:transparent}
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="brand">
      <h1>筋トレ<span class="accent">記録</span></h1>
      <button class="icon-btn" id="btnSettings" aria-label="設定">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        設定
      </button>
    </div>
    <div class="weekbar" id="weekbar" style="display:none">
      <button id="wkPrev">‹</button>
      <div style="text-align:center">
        <div class="wk" id="wkLabel">—</div>
        <div class="phase" id="wkPhase"></div>
      </div>
      <button id="wkNext">›</button>
    </div>
  </header>

  <main id="view"></main>
</div>

<nav class="tabs">
  <a class="active" data-tab="analysis" href="#"><svg viewBox="0 0 24 24"><path d="M3 3v18h18"/><rect x="7" y="10" width="3" height="7"/><rect x="12" y="6" width="3" height="11"/><rect x="17" y="13" width="3" height="4"/></svg>分析</a>
  <a data-tab="record" href="#"><svg viewBox="0 0 24 24"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4z"/></svg>記録</a>
  <a data-tab="split" href="#"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>分割</a>
  <a data-tab="trend" href="#"><svg viewBox="0 0 24 24"><path d="M3 17l6-6 4 4 8-8"/><path d="M17 7h4v4"/></svg>推移</a>
</nav>

<div class="overlay" id="overlay"><div class="sheet" id="sheet"></div></div>

<script>
/* ============ 定数・シード ============ */
const MUSCLES = ["上部胸","下部胸","サイドデルト","リアデルト","フロントデルト","広背筋","僧帽筋/背中厚み","二頭筋","三頭筋","大腿四頭筋","ハムストリング","臀筋","カーフ","腹筋"];
const MUSCLE_GROUP = {
  "上半身・押す":["上部胸","下部胸","フロントデルト","三頭筋"],
  "上半身・引く/肩":["広背筋","僧帽筋/背中厚み","サイドデルト","リアデルト","二頭筋"],
  "下半身・体幹":["大腿四頭筋","ハムストリング","臀筋","カーフ","腹筋"]
};
const SEED_TARGETS = {
  "上部胸":[5,7,11,12],"下部胸":[5,6,10,11],"サイドデルト":[8,16,22,26],"リアデルト":[6,12,18,22],
  "フロントデルト":[0,null,null,12],"広背筋":[6,10,16,18],"僧帽筋/背中厚み":[4,8,14,18],
  "二頭筋":[7,14,20,26],"三頭筋":[7,10,14,18],"大腿四頭筋":[8,12,18,20],"ハムストリング":[6,10,16,20],
  "臀筋":[0,4,12,16],"カーフ":[8,12,16,20],"腹筋":[0,10,16,20]
};
/* e(name, region, active, loading, [primary...], [secondary...], review?) */
function e(name,region,active,loading,pri,sec,review){
  const tags=[];
  (pri||[]).forEach(t=>tags.push({tag:t,role:"primary"}));
  (sec||[]).forEach(t=>tags.push({tag:t,role:"secondary"}));
  return {id:"ex_"+name,name,body_region:region,muscle_tags:tags,is_active:active,loading_type:loading,review:!!review};
}
const DB_DUMBBELL="両手ダンベル",SINGLE="単一ダンベル",BW="自重",BWX="自重＋加重";
const SEED_EXERCISES=[
  // 胸
  e("ベンチプレス","upper",false,DB_DUMBBELL,["下部胸"],["三頭筋","フロントデルト"]),
  e("インクラインダンベルプレス","upper",true,DB_DUMBBELL,["上部胸"],["三頭筋","フロントデルト"]),
  e("インクライン","upper",true,DB_DUMBBELL,["上部胸"],["三頭筋","フロントデルト"],true),
  e("ダンベルフライ","upper",true,DB_DUMBBELL,["下部胸"],[],true),
  e("ダンベルプレス","upper",true,DB_DUMBBELL,["下部胸"],["三頭筋","フロントデルト"]),
  e("ディクラインダンベルプレス","upper",true,DB_DUMBBELL,["下部胸"],["三頭筋"]),
  e("チェストプレス","upper",false,DB_DUMBBELL,["下部胸"],["三頭筋","フロントデルト"]),
  e("ペックフライ","upper",false,DB_DUMBBELL,["下部胸"],[]),
  e("ディップス","upper",true,BW,["下部胸"],["三頭筋","フロントデルト"]),
  e("腕立て伏せ","upper",true,BW,["下部胸"],["三頭筋","フロントデルト"]),
  e("アーチャープッシュアップ","upper",true,BW,["下部胸"],["三頭筋"]),
  e("ウォールプッシュアップ","upper",true,BW,["下部胸"],[]),
  e("ディクラインプッシュアップ","upper",true,BW,["上部胸"],["三頭筋"]),
  e("スローダイヤモンドプッシュアップ","upper",true,BW,["三頭筋"],["下部胸"]),
  e("リバースプッシュアップ","upper",true,BW,["三頭筋"],["下部胸","フロントデルト"],true),
  // 肩
  e("ダンベルショルダープレス","upper",true,DB_DUMBBELL,["フロントデルト"],["サイドデルト","三頭筋"]),
  e("サイドレイズ","upper",true,DB_DUMBBELL,["サイドデルト"],[]),
  e("リアレイズ","upper",true,DB_DUMBBELL,["リアデルト"],[]),
  e("アップライトロウ","upper",true,DB_DUMBBELL,["サイドデルト"],["僧帽筋/背中厚み"],true),
  e("ミリタリープレス","upper",false,DB_DUMBBELL,["フロントデルト"],["サイドデルト","三頭筋"]),
  e("ショルダープレス（マシン）","upper",false,DB_DUMBBELL,["フロントデルト"],["サイドデルト","三頭筋"]),
  e("ハンドスタンドプッシュアップ","upper",true,BW,["フロントデルト"],["サイドデルト","三頭筋"]),
  // 背中
  e("ラットプルダウン","upper",false,DB_DUMBBELL,["広背筋"],["二頭筋"]),

/* ============ IndexedDB ============ */
const DBN="kintore",DBV=4,STORES=["exercises","sessions","setlogs","targets","meta","templates","progressions","conditioning"];
let db;
function openDB(){return new Promise((res,rej)=>{const r=indexedDB.open(DBN,DBV);
  r.onupgradeneeded=ev=>{const d=ev.target.result;STORES.forEach(s=>{if(!d.objectStoreNames.contains(s))d.createObjectStore(s,{keyPath:"id"})});};
  r.onsuccess=()=>{db=r.result;res()};r.onerror=()=>rej(r.error);});}
function tx(store,mode){return db.transaction(store,mode).objectStore(store);}
function put(store,val){return new Promise((res,rej)=>{const r=tx(store,"readwrite").put(val);r.onsuccess=res;r.onerror=()=>rej(r.error);});}
function getAll(store){return new Promise((res,rej)=>{const r=tx(store,"readonly").getAll();r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error);});}
function getOne(store,id){return new Promise((res,rej)=>{const r=tx(store,"readonly").get(id);r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error);});}
function clearStore(store){return new Promise((res,rej)=>{const r=tx(store,"readwrite").clear();r.onsuccess=res;r.onerror=()=>rej(r.error);});}
function bulkPut(store,vals){return new Promise((res,rej)=>{const t=db.transaction(store,"readwrite"),o=t.objectStore(store);vals.forEach(v=>o.put(v));t.oncomplete=res;t.onerror=()=>rej(t.error);});}
function del(store,id){return new Promise((res,rej)=>{const r=tx(store,"readwrite").delete(id);r.onsuccess=res;r.onerror=()=>rej(r.error);});}

/* ============ 週ユーティリティ ============ */
function mondayOf(d){const x=new Date(d);const day=(x.getDay()+6)%7;x.setHours(0,0,0,0);x.setDate(x.getDate()-day);return x;}
function fmtMD(d){return String(d.getMonth()+1).padStart(2,"0")+"/"+String(d.getDate()).padStart(2,"0");}
function isoDate(d){return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
function latestLogDate(){let mx=null;STATE.logs.forEach(l=>{if(!mx||l.date>mx)mx=l.date;});return mx?new Date(mx+"T00:00:00"):new Date();}
function currentWeekStart(){const base=mondayOf(latestLogDate());base.setDate(base.getDate()+STATE.weekOffset*7);return base;}

/* ============ 集計 ============ */
function aggregateWeek(weekStart){
  const ws=isoDate(weekStart),we=isoDate(new Date(weekStart.getTime()+6*864e5));
  const totals={};MUSCLES.forEach(m=>totals[m]=0);const extra={};
  let setCount=0,exSet=new Set(),sessSet=new Set();
  STATE.logs.forEach(l=>{
    if(l.date<ws||l.date>we)return;
    setCount++;exSet.add(l.exercise_id);sessSet.add(l.session_id);
    const x=STATE.exMap[l.exercise_id];
    const tags=x?x.muscle_tags:[{tag:l._fallback||"未分類",role:"primary"}];
    tags.forEach(t=>{const w=t.role==="primary"?1:0.5;
      if(totals[t.tag]!==undefined)totals[t.tag]+=w;else extra[t.tag]=(extra[t.tag]||0)+w;});
  });
  return {totals,extra,setCount,exCount:exSet.size,sessCount:sessSet.size,ws,we};
}
function statusOf(v,t){
  if(!t)return{key:"none",label:"",color:"var(--dim)"};
  const {mev,mav_low,mav_high,mrv}=t;
  if(mev===0&&v===0)return{key:"none",label:"",color:"var(--dim)"};
  if(mrv!=null&&v>=mrv)return{key:"over",label:"過多",color:"var(--rust)"};
  if(mav_high!=null&&v>mav_high)return{key:"high",label:"やや多い",color:"var(--amber)"};
  if(mav_low!=null&&v>=mav_low)return{key:"good",label:"適正",color:"var(--patina)"};
  if(v>=mev&&mev>0)return{key:"low",label:"不足気味",color:"var(--amber)"};
  if(mev===0&&v>0)return{key:"good",label:"適正",color:"var(--patina)"};
  return{key:"under",label:"不足",color:"var(--rust)"};
}

function barRow(m,v,t,factor){
  factor=factor||1;v=Math.round(v*10)/10;
  const sc=x=>x==null?null:Math.round(x*factor);
  const t2=t?{mev:sc(t.mev),mav_low:sc(t.mav_low),mav_high:sc(t.mav_high),mrv:sc(t.mrv)}:null;
  t=t2;
  const st=statusOf(v,t);
  const mrv=t&&t.mrv!=null?t.mrv:Math.max(v,10);
  const scale=Math.max(mrv*1.12,v*1.05,1);
  const pct=Math.min(100,v/scale*100);
  let ticks="";
  if(t){[["mev",t.mev],["ml",t.mav_low],["mh",t.mav_high],["mrv",t.mrv]].forEach(([c,val])=>{
    if(val!=null&&val>0){const p=Math.min(100,val/scale*100);ticks+=`<div class="tick ${c==="mrv"?"mrv":""}" style="left:${p}%"></div>`;}});}
  const range=t?(t.mav_low!=null?`${t.mav_low}–${t.mav_high}`:`≤${t.mrv}`):"";
  return `<div class="bar-row"><div class="bar-top">
    <span class="mn">${esc(m)}<span class="status-pill" style="background:${st.color}22;color:${st.color}">${st.label}</span></span>
    <span class="vals" style="color:${st.color}">${fmtN(v)}${range?` <span style="color:var(--dim)">/ ${range}</span>`:""}</span>
    </div><div class="track"><div class="fill" style="width:${pct}%;background:${st.color}"></div>${ticks}</div></div>`;
}
function barRowRaw(m,v){
  v=Math.round(v*10)/10;
  return `<div class="bar-row"><div class="bar-top">
    <span class="mn">${esc(m)}</span><span class="vals" style="color:var(--amber)">${fmtN(v)}</span>
    </div><div class="track"><div class="fill" style="width:${Math.min(100,v*4)}%;background:var(--amber)"></div></div></div>`;
}

function lastRecordFor(exId,beforeDate){

  if(!rows.length)return null;

  return rows.filter(r=>r.date===mx).sort((a,b)=>(a.set_number||0)-(b.set_number||0))

  const entries=t.items.map(it=>{
    const last=lastRecordFor(it.exercise_id,date);const sets=[];
    const n=Math.max(1,it.sets||3);
    for(let i=0;i<n;i++){const src=last?(last[i]||last[last.length-1]):null;
      sets.push({weight:src?src.weight:"",reps:src?src.reps:"",rir:src?src.rir:it.rir,set_type:"normal"});}
    return {exercise_id:it.exercise_id,memo:"",sets,hint:it};});

function loadExistingDraft(date){

/* ============ 停滞検知＋7手法 ============ */
function daysBetween(a,b){return Math.abs((Date.parse(b)-Date.parse(a))/864e5);}
function seriesForExerciseBucket(exId,bucket){
  const bySess={};
  STATE.logs.forEach(l=>{if(l.exercise_id!==exId||l.weight_kg==null||l.reps==null)return;if(bucketOf(l.reps)!==bucket)return;
    const k=l.session_id;if(!bySess[k]||l.weight_kg>bySess[k].w)bySess[k]={w:l.weight_kg,date:l.date};});
  return Object.values(bySess).sort((a,b)=>a.date<b.date?-1:a.date>b.date?1:0);
}
function currentBucketOf(exId){
  let latest=null;STATE.logs.forEach(l=>{if(l.exercise_id!==exId||l.weight_kg==null||l.reps==null)return;
    if(!latest||l.date>latest.date||(l.date===latest.date&&l.weight_kg>latest.w))latest={date:l.date,w:l.weight_kg,reps:l.reps};});
  return latest?{bucket:bucketOf(latest.reps),date:latest.date}:null;
}
function bucketMax(exId,bucket){let m=null;STATE.logs.forEach(l=>{if(l.exercise_id!==exId||l.weight_kg==null||l.reps==null)return;
  if(bucketOf(l.reps)!==bucket)return;if(m==null||l.weight_kg>m)m=l.weight_kg;});return m;}
function detectPlateaus(){
  const N=(STATE.settings&&STATE.settings.plateauN)||5;const maxDate=isoDate(latestLogDate());const res=[];
  STATE.ex.forEach(ex=>{if(!ex.is_active)return;
    const cur=currentBucketOf(ex.id);if(!cur||!cur.bucket)return;
    if(daysBetween(cur.date,maxDate)>45)return;
    const series=seriesForExerciseBucket(ex.id,cur.bucket);if(series.length<N+1)return;
    let mx=-Infinity,lastPR=0;series.forEach((s,i)=>{if(s.w>mx){mx=s.w;lastPR=i;}});
    const trailing=series.length-1-lastPR;
    if(trailing>=N)res.push({exercise_id:ex.id,bucket:cur.bucket,stallWeight:mx,stallStart:series[lastPR].date,sessions:trailing});
  });
  return res.sort((a,b)=>b.sessions-a.sessions);
}
async function reconcileProgressions(plateaus){
  const cel=[];
  for(const pr of [...STATE.progressions]){
    const bmax=bucketMax(pr.exercise_id,pr.bucket);
    if(bmax!=null&&bmax>pr.plateau_max){
      cel.push({exercise_id:pr.exercise_id,bucket:pr.bucket,from:pr.plateau_max,to:bmax,tried:pr.method_index});
      await del("progressions",pr.id);STATE.progressions=STATE.progressions.filter(x=>x.id!==pr.id);
    }
  }
  for(const p of plateaus){const id=p.exercise_id+"|"+p.bucket;
    if(!STATE.progressions.find(x=>x.id===id)){
      const rec={id,exercise_id:p.exercise_id,bucket:p.bucket,method_index:0,plateau_max:p.stallWeight,history:[]};
      await put("progressions",rec);STATE.progressions.push(rec);}
  }
  return cel;
}
async function tryMethod(exId,bucket){
  const pr=STATE.progressions.find(x=>x.id===exId+"|"+bucket);if(!pr)return;
  if(pr.method_index<METHODS.length){pr.history.push({date:todayISO(),method:METHODS[pr.method_index]});pr.method_index++;}
  await put("progressions",pr);renderAnalysis();
}
function showHistory(exId,bucket){const pr=STATE.progressions.find(x=>x.id===exId+"|"+bucket);const ex=STATE.exMap[exId];
  openSheet(`<div class="sheet-head"><h2>試した手法の履歴</h2><button onclick="closeSheet()">×</button></div>
    <div class="lbl" style="margin-bottom:10px">${esc(ex?ex.name:exId)}（${bucket}）</div>
    ${pr&&pr.history.length?pr.history.map((h,i)=>`<div class="set-item"><div><div class="lbl">${i+1}. ${esc(h.method)}</div><div class="desc">${h.date}</div></div></div>`).join(""):'<div style="color:var(--dim);font-size:13px">まだありません</div>'}`);
}
function coachingHTML(){
  let h="";
  (STATE.celebrations||[]).forEach(c=>{const ex=STATE.exMap[c.exercise_id];
    h+=`<div class="coach-card win"><div class="ch"><i>✓</i><b>停滞を突破！</b></div>
      <div class="cx num">${esc(ex?ex.name:c.exercise_id)}（${c.bucket}）: ${fmtN(c.from)} → ${fmtN(c.to)}kg</div></div>`;});
  STATE.celebrations=[];
  (STATE.plateaus||[]).slice(0,4).forEach(p=>{const ex=STATE.exMap[p.exercise_id];
    const pr=STATE.progressions.find(x=>x.id===p.exercise_id+"|"+p.bucket);const idx=pr?pr.method_index:0;const done=idx>=METHODS.length;
    h+=`<div class="coach-card"><div class="ch"><i class="warn">!</i><b>停滞を検知</b><span class="cnt">${p.bucket} / ${p.sessions}セッション</span></div>
      <div class="cx num">${esc(ex?ex.name:p.exercise_id)} ${fmtN(p.stallWeight)}kg 停滞中</div>
      ${done?`<div class="cnext">7手法を試し切りました。種目の入れ替え／専門家への相談を検討。</div>`
        :`<div class="cnext">次の一手 <b>${idx+1}/7</b>：${esc(METHODS[idx])}</div>
          <div class="cbtns"><button class="btn-sm accent" onclick="tryMethod('${esc(p.exercise_id)}','${p.bucket}')">試した →</button>
          ${pr&&pr.history.length?`<button class="btn-sm" onclick="showHistory('${esc(p.exercise_id)}','${p.bucket}')">履歴 ${pr.history.length}</button>`:""}</div>`}
    </div>`;});
  return h;
}

/* ============ 進捗グラフ ============ */
function exerciseWeightSeries(exId){
  const bySess={};STATE.logs.forEach(l=>{if(l.exercise_id!==exId||l.weight_kg==null)return;const k=l.session_id;
    if(!bySess[k]||l.weight_kg>bySess[k].value)bySess[k]={date:l.date,value:l.weight_kg};});
  return Object.values(bySess).sort((a,b)=>a.date<b.date?-1:1).slice(-40);
}
function muscleVolumeSeries(m,weeks){
  const end=mondayOf(latestLogDate()),arr=[];
  for(let i=weeks-1;i>=0;i--){const ws=new Date(end.getTime()-i*7*864e5);const A=aggregateWeek(ws);
    arr.push({date:isoDate(ws),value:Math.round((A.totals[m]||0)*10)/10});}
  return arr;
}
function chartSVG(series,opts){
  opts=opts||{};const W=340,H=190,pl=32,pr=10,pt=12,pb=24,plotW=W-pl-pr,plotH=H-pt-pb;
  if(!series||!series.length)return `<div class="soon">データなし</div>`;
  const ys=series.map(s=>s.value);let ymin=Math.min(...ys),ymax=Math.max(...ys);
  if(ymin===ymax){ymin-=1;ymax+=1;}const yr=ymax-ymin;ymin-=yr*0.12;ymax+=yr*0.12;if(ymin<0&&Math.min(...ys)>=0)ymin=0;
  const ds=series.map(s=>Date.parse(s.date));let xmin=Math.min(...ds),xmax=Math.max(...ds);if(xmin===xmax){xmin-=864e5;xmax+=864e5;}
  const X=d=>pl+(Date.parse(d)-xmin)/(xmax-xmin)*plotW,Y=v=>pt+(1-(v-ymin)/(ymax-ymin))*plotH;
  const color=opts.color||"var(--rust)";let grid="",labels="";
  for(let g=0;g<=3;g++){const yv=ymin+(ymax-ymin)*g/3,yy=Y(yv);
    grid+=`<line x1="${pl}" y1="${yy.toFixed(1)}" x2="${W-pr}" y2="${yy.toFixed(1)}" stroke="var(--line)" stroke-width="1"/>`;
    labels+=`<text x="${pl-4}" y="${(yy+3).toFixed(1)}" text-anchor="end" font-size="9" fill="var(--dim)">${Math.round(yv*10)/10}</text>`;}
  const pts=series.map(s=>`${X(s.date).toFixed(1)},${Y(s.value).toFixed(1)}`).join(" ");
  const dots=series.map(s=>`<circle cx="${X(s.date).toFixed(1)}" cy="${Y(s.value).toFixed(1)}" r="2.3" fill="${color}"/>`).join("");
  const xi=[series[0],series[Math.floor(series.length/2)],series[series.length-1]];
  const xl=xi.map(s=>`<text x="${X(s.date).toFixed(1)}" y="${H-8}" text-anchor="middle" font-size="9" fill="var(--dim)">${s.date.slice(5)}</text>`).join("");
  let vline="";
  if(opts.vlineDate){const vx=X(opts.vlineDate);if(vx>=pl&&vx<=W-pr)vline=`<line x1="${vx.toFixed(1)}" y1="${pt}" x2="${vx.toFixed(1)}" y2="${pt+plotH}" stroke="var(--amber)" stroke-width="1.2" stroke-dasharray="4 3"/><text x="${Math.min(vx+3,W-pr-40).toFixed(1)}" y="${pt+10}" font-size="9" fill="var(--amber)">${esc(opts.vlineText||"")}</text>`;}
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;background:var(--surface);border:.5px solid var(--line);border-radius:12px;font-family:var(--font-mono)">${grid}${labels}${vline}<polyline points="${pts}" fill="none" stroke="${color}" stroke-width="2" stroke-linejoin="round"/>${dots}${xl}</svg>`;
}

  const mode=STATE.trendMode||"exercise";

/* ============ CSVインポート ============ */
function openImport(){
  openSheet(`<div class="sheet-head"><h2>CSVインポート</h2><button onclick="closeSheet()">×</button></div>
    <div class="file-drop"><b>kinnik_CSV_training…</b> を選んでください<br><span style="font-size:11px">※ group_set / body_data / aerobic 等の他4ファイルは非対応</span></div>
    <input type="file" id="csvFile" accept=".csv,.txt,text/csv,text/comma-separated-values,text/plain,application/vnd.ms-excel,application/csv" style="width:100%;padding:10px 0">
    <label style="display:flex;align-items:center;gap:8px;margin-top:12px;font-size:13px;color:var(--muted)">
      <input type="checkbox" id="csvReplace" style="width:auto"> 取り込み前に既存の記録を全消去する</label>
    <button class="btn-primary" style="width:100%;margin-top:16px" onclick="doImport()">取り込む</button>
    <div class="msg" id="importMsg"></div>`);
}
function parseCSV(text){
  const rows=[];let row=[],cur="",q=false;
  text=text.replace(/^﻿/,"");
  for(let i=0;i<text.length;i++){const c=text[i];
    if(q){if(c==='"'){if(text[i+1]==='"'){cur+='"';i++;}else q=false;}else cur+=c;}
    else{if(c==='"')q=true;else if(c===","){row.push(cur);cur="";}
      else if(c==="\n"){row.push(cur);rows.push(row);row=[];cur="";}
      else if(c==="\r"){}else cur+=c;}}
  if(cur.length||row.length){row.push(cur);rows.push(row);}
  return rows.filter(r=>r.length>1||(r.length===1&&r[0].trim()!==""));
}
function normDate(s){s=(s||"").trim();if(!s)return null;
  let m=s.match(/(\d{4})[-/](\d{1,2})[-/](\d{1,2})/);
  if(m)return m[1]+"-"+m[2].padStart(2,"0")+"-"+m[3].padStart(2,"0");
  const d=new Date(s);return isNaN(d)?null:isoDate(d);}
function parseRIR(s){s=(s||"").trim();if(!s)return null;
  let m=s.match(/RPE\s*(\d+(?:\.\d+)?)/i);if(m)return Math.max(0,10-parseFloat(m[1]));
  m=s.match(/-?\d+(?:\.\d+)?/);return m?parseFloat(m[0]):null;}
function mapSetType(s){s=(s||"").toLowerCase();
  if(s.includes("myo"))return"myo-rep";if(s.includes("drop"))return"drop";
  if(s.includes("partial")||s.includes("パーシャル"))return"partial";if(s.includes("tempo")||s.includes("テンポ"))return"tempo";
  return"normal";}

async function doImport(){
  const f=document.getElementById("csvFile").files[0];
  const msg=document.getElementById("importMsg");
  if(!f){msg.className="msg err";msg.textContent="ファイルを選択してください。";return;}
  msg.className="msg info";msg.textContent="読み込み中…";
  try{
    const text=await f.text();const rows=parseCSV(text);
    if(rows.length<2)throw new Error("行が読めませんでした。");
    const head=rows[0].map(h=>h.trim().toLowerCase());
    const col=n=>head.indexOf(n);
    const ci={date:col("date"),bp:col("body part"),ex:col("exercise"),gid:col("group session id"),
      user:col("user"),set:col("set"),w:col("weight"),reps:col("reps"),rir:col("rpe/rir"),
      st:col("set type"),sm:col("set memo"),note:col("note")};
    if(ci.ex<0||ci.date<0)throw new Error("このファイルはトレーニング記録ではないようです（Exercise / Date 列なし）。kinnik_CSV_training… という名前のCSVを選んでください。");
    if(document.getElementById("csvReplace").checked){await clearStore("setlogs");await clearStore("sessions");}
    const newEx={},logs=[],sessions={};let unmatched=0,fallback=0,n=0,skipped=0;
    for(let i=1;i<rows.length;i++){
      const r=rows[i];const name=(r[ci.ex]||"").trim();const date=normDate(r[ci.date]);
      if(!name||!date){skipped++;continue;}
      let ex=STATE.exMap._byName[name]||newEx[name];
      let fbTag=null;
      if(!ex){
        const bp=(r[ci.bp]||"").trim();fbTag=BODYPART_FALLBACK[bp]||"未分類";
        const region=["足"].includes(bp)?"lower":"upper";
        ex=e(name,region,true,DB_DUMBBELL,[fbTag],[]);ex.review=true;ex.imported=true;
        newEx[name]=ex;unmatched++;
      }
      const gid=ci.gid>=0&&(r[ci.gid]||"").trim()?"gs_"+r[ci.gid].trim():"d_"+date+"_"+(r[ci.user]||"u");
      if(!sessions[gid])sessions[gid]={id:gid,date,split_day:"custom",mesocycle_id:null,week_in_mesocycle:null,is_deload:false};
      const w=parseFloat((r[ci.w]||"").replace(/[^0-9.\-]/g,""));const reps=parseInt((r[ci.reps]||"").replace(/[^0-9\-]/g,""),10);
      logs.push({id:gid+"_"+i,session_id:gid,exercise_id:ex.id,date,
        set_number:parseInt(r[ci.set],10)||1,weight_kg:isNaN(w)?null:w,reps:isNaN(reps)?null:reps,
        rir:parseRIR(r[ci.rir]),set_type:mapSetType(r[ci.st]),
        memo:[r[ci.sm],r[ci.note]].map(x=>(x||"").trim()).filter(Boolean).join(" / "),
        _fallback:fbTag});
      n++;
    }
    const exArr=Object.values(newEx);
    if(exArr.length)await bulkPut("exercises",exArr);
    await bulkPut("sessions",Object.values(sessions));
    await bulkPut("setlogs",logs);
    await loadState();
    let m=`取り込み完了：${n}セット / ${Object.keys(sessions).length}セッション。`;
    if(unmatched)m+=` 新規種目 ${unmatched}件（未分類タグで仮置き→種目マスタで確認）。`;
    if(skipped)m+=` 空行スキップ ${skipped}件。`;
    msg.className="msg ok";msg.innerHTML=esc(m)+` <a class="link" href="#" onclick="closeSheet();return false">閉じて分析を見る</a>`;
    STATE.weekOffset=0;renderAnalysis();
  }catch(err){msg.className="msg err";msg.textContent="失敗: "+err.message;}
}
